<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>نور | المساعد الإسلامي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f12;--bg2:#101418;--bg3:#141a20;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --gold:#c9a84c;--gold2:#e2c06e;--gold3:#8a6f32;
  --gbg:rgba(201,168,76,0.08);
  --txt:#f0ebe0;--txt2:#8a9ba8;--txt3:#4a5a65;
  --red:#e05050;--green:#4caf82;
}
body.light{
  --bg:#f5f0e8;--bg2:#ede8de;--bg3:#e2dbd0;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.16);
  --txt:#1a1610;--txt2:#4a4030;--txt3:#7a6a55;
  --gbg:rgba(201,168,76,0.13);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);direction:rtl;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.layout{display:flex;height:100vh}
/* SIDEBAR */
.sb{width:255px;min-width:255px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:all .3s;overflow:hidden;flex-shrink:0;z-index:10}
.sb.closed{width:0;min-width:0;border:none}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:.9rem;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:.5rem}
.logo-txt{font-family:'Amiri',serif;font-size:1.4rem;font-weight:700;color:var(--gold)}
.ibtn{background:none;border:none;color:var(--txt3);cursor:pointer;padding:.35rem;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:.2s;line-height:1;font-size:.9rem}
.ibtn:hover{color:var(--txt);background:var(--bg3)}
.newbtn{margin:.75rem;padding:.6rem;background:var(--gbg);border:1px solid rgba(201,168,76,0.25);border-radius:8px;color:var(--gold);font-family:'Tajawal',sans-serif;font-size:.87rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem;flex-shrink:0}
.clabel{font-size:.67rem;font-weight:700;color:var(--txt3);padding:.6rem .7rem .25rem}
.sb-cats{padding:0 .5rem;flex-shrink:0}
.cat{display:flex;align-items:center;gap:.5rem;padding:.45rem .6rem;background:none;border:none;border-radius:7px;color:var(--txt2);font-family:'Tajawal',sans-serif;font-size:.83rem;cursor:pointer;text-align:right;width:100%;white-space:nowrap;transition:.2s}
.cat:hover{background:var(--bg3);color:var(--txt)}.cat.on{background:var(--gbg);color:var(--gold);font-weight:600}
.sb-hist{flex:1;overflow-y:auto;padding:0 .5rem}
.hi{padding:.45rem .6rem;border-radius:7px;cursor:pointer;font-size:.78rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.2s}
.hi:hover{background:var(--bg3);color:var(--txt)}.hi.on{background:var(--gbg);color:var(--gold)}
.sb-foot{padding:.6rem;border-top:1px solid var(--border);flex-shrink:0}
.fbtn{display:flex;align-items:center;gap:.45rem;padding:.45rem .6rem;background:none;border:none;color:var(--txt2);font-family:'Tajawal',sans-serif;font-size:.81rem;cursor:pointer;border-radius:7px;width:100%;transition:.2s}
.fbtn:hover{background:var(--bg3);color:var(--txt)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;padding:.7rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;gap:.5rem}
.topmode{font-size:.87rem;font-weight:600;color:var(--txt2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* WELCOME */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 1rem;overflow-y:auto}
.wring{position:absolute;width:85px;height:85px;border-radius:50%;border:1px solid rgba(201,168,76,0.15);animation:pulse 3s ease-in-out infinite;pointer-events:none}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.15);opacity:.15}}
.wlogo{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:1rem}
.wtitle{font-family:'Amiri',serif;font-size:1.6rem;font-weight:700;color:var(--gold);text-align:center;margin-bottom:.3rem}
.wsub{font-size:.9rem;color:var(--txt2);text-align:center;margin-bottom:1.4rem;line-height:1.7}
.wsub strong{color:var(--gold2)}
/* PRAYER */
.pw{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:.9rem 1.1rem;width:100%;max-width:540px;margin-bottom:1.4rem}
.pwh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;font-size:.83rem;color:var(--txt2);font-weight:600}
.pwcity{font-size:.74rem;color:var(--gold3)}
.ptg{display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem;text-align:center}
.pti{display:flex;flex-direction:column;gap:.2rem}.ptn{font-size:.68rem;color:var(--txt3)}.ptt{font-size:.9rem;font-weight:700;color:var(--txt)}.ptt.nx{color:var(--gold)}
.pwnext{margin-top:.55rem;padding-top:.55rem;border-top:1px solid var(--border);font-size:.74rem;color:var(--gold3);text-align:center}
/* SUGGESTIONS */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:.55rem;width:100%;max-width:540px}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.8rem;cursor:pointer;text-align:right;display:flex;flex-direction:column;gap:.3rem;transition:.2s;font-family:'Tajawal',sans-serif}
.sc:hover{background:var(--bg2);border-color:var(--gold3)}.si{font-size:1.1rem}.st{font-size:.81rem;color:var(--txt2);line-height:1.4}
/* CHAT */
.chatarea{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:1rem 0}
.msgs{width:100%;max-width:700px;padding:0 1rem;display:flex;flex-direction:column}
.msg{display:flex;gap:.75rem;padding:.9rem 0;border-bottom:1px solid rgba(255,255,255,0.04)}.msg:last-child{border-bottom:none}
body.light .msg{border-bottom-color:rgba(0,0,0,0.05)}
.msg.new{animation:fin .2s ease}@keyframes fin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.mav{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.74rem;font-weight:700}
.mav.u{background:linear-gradient(135deg,#2a3a50,#3a4a60);color:#f0ebe0}.mav.a{background:linear-gradient(135deg,var(--gold3),var(--gold));color:#0c0f12}
.mcon{flex:1;min-width:0}.mwho{font-size:.74rem;font-weight:700;color:var(--txt3);margin-bottom:.28rem}
.mtxt{font-size:.92rem;color:var(--txt);line-height:1.85;word-wrap:break-word}
.mtxt p{margin-bottom:.55rem}.mtxt p:last-child{margin-bottom:0}
.mtxt strong{color:var(--gold2)}.mtxt em{color:var(--txt2)}
.mtxt blockquote{border-right:3px solid var(--gold);padding:.55rem .8rem;margin:.55rem 0;background:var(--gbg);border-radius:0 8px 8px 0;font-family:'Amiri',serif;font-size:1rem;line-height:2;color:var(--gold2)}
.mtxt ul,.mtxt ol{padding-right:1.2rem;margin:.35rem 0}.mtxt li{margin-bottom:.2rem;line-height:1.65}
.mtxt h3{font-size:.9rem;font-weight:700;color:var(--gold2);margin:.75rem 0 .3rem}
.mtxt pre{background:#0d1117;border:1px solid var(--border);border-radius:7px;padding:.75rem;overflow-x:auto;direction:ltr;text-align:left;margin:.55rem 0;font-size:.82rem;color:#c9d1d9}
body.light .mtxt pre{background:#1a1a2e;color:#c9d1d9}
.mtxt code{background:rgba(255,255,255,0.06);border-radius:4px;padding:.1em .3em;font-family:monospace;font-size:.82em;color:#9db8d2;direction:ltr;display:inline-block}
body.light .mtxt code{background:rgba(0,0,0,0.08);color:#2a4a7a}
.macts{display:flex;gap:.3rem;margin-top:.4rem;opacity:0;transition:.2s;flex-wrap:wrap}.msg:hover .macts{opacity:1}
.mact{background:none;border:1px solid var(--border);border-radius:5px;padding:.18rem .45rem;font-size:.68rem;color:var(--txt3);cursor:pointer;font-family:'Tajawal',sans-serif;transition:.15s}
.mact:hover{background:var(--gbg);color:var(--gold)}.mact:disabled{opacity:.4;cursor:not-allowed}
/* translation */
.transl{margin-top:.5rem;padding:.5rem .7rem;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;font-size:.83rem;color:var(--txt2);direction:ltr;text-align:left;line-height:1.6}
body.light .transl{background:rgba(0,0,0,0.04)}
/* message image */
.msg-img{max-width:220px;max-height:160px;border-radius:8px;margin-bottom:.4rem;display:block;object-fit:cover;border:1px solid var(--border)}
/* typing */
.typing{display:flex;align-items:center;gap:.3rem;padding:.3rem 0}
.td{width:6px;height:6px;border-radius:50%;background:var(--gold3);animation:tb 1.2s ease-in-out infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
/* INPUT */
.inarea{padding:.75rem 1rem .9rem;border-top:1px solid var(--border);flex-shrink:0}
.inwrap{max-width:700px;margin:0 auto;background:var(--bg3);border:1px solid var(--border2);border-radius:13px;padding:.6rem .8rem;display:flex;flex-direction:column;gap:.35rem}
.inwrap:focus-within{border-color:var(--gold3);box-shadow:0 0 0 3px rgba(201,168,76,0.07)}
.inbadge{font-size:.69rem;color:var(--gold3);font-weight:600}
/* attach preview */
.att-prev{display:flex;align-items:center;gap:.5rem;padding:.3rem .5rem;background:var(--gbg);border:1px dashed var(--gold3);border-radius:8px}
.att-prev img{height:38px;width:38px;object-fit:cover;border-radius:5px;flex-shrink:0}
.att-prev span{flex:1;font-size:.75rem;color:var(--gold2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-x{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:.85rem;padding:.1rem .3rem;border-radius:4px;flex-shrink:0;line-height:1}
.att-x:hover{color:var(--red)}
/* tool row */
.inrow{display:flex;align-items:flex-end;gap:.35rem}
.tbtn{flex-shrink:0;background:none;border:1px solid transparent;color:var(--txt3);cursor:pointer;padding:.28rem .38rem;border-radius:7px;font-size:1rem;display:flex;align-items:center;transition:.15s;line-height:1}
.tbtn:hover{color:var(--gold);background:var(--gbg);border-color:rgba(201,168,76,0.2)}
.tbtn.rec{color:var(--red);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.inwrap textarea{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:.9rem;resize:none;line-height:1.65;max-height:140px;min-height:22px}
.inwrap textarea::placeholder{color:var(--txt3)}
.sbtn{flex-shrink:0;width:32px;height:32px;background:linear-gradient(135deg,var(--gold3),var(--gold));border:none;border-radius:7px;color:#0c0f12;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.sbtn:disabled{opacity:.35;cursor:not-allowed}.sbtn:hover:not(:disabled){transform:scale(1.06)}
.disc{max-width:700px;margin:.3rem auto 0;font-size:.67rem;color:var(--txt3);text-align:center;display:flex;align-items:center;justify-content:center;gap:.4rem}
/* key status */
.kdot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
.kdot.w{background:#f0a030}.kdot.e{background:var(--red)}
/* modal */
.ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.mbox{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:420px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;border-bottom:1px solid var(--border)}
.mhead h2{font-size:.95rem;font-weight:700}
.mbody{overflow-y:auto;padding:1.2rem;display:flex;flex-direction:column;gap:1rem}
.azbtn{flex:1;padding:.45rem;border-radius:7px;font-family:'Tajawal',sans-serif;font-size:.83rem;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--txt2)}
.azbtn.on{background:var(--gbg);border-color:var(--gold3);color:var(--gold)}
.azc{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:.9rem;margin-bottom:.55rem}
.aza{font-family:'Amiri',serif;font-size:1rem;line-height:2;color:var(--gold2);margin-bottom:.35rem}
.azk{font-size:.72rem;color:var(--gold3);margin-bottom:.25rem}.azf{font-size:.75rem;color:var(--txt2);line-height:1.5}
#bd{display:none;position:fixed;inset:0;z-index:9;background:rgba(0,0,0,.5)}
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:.55rem 1.2rem;font-size:.82rem;color:var(--txt);z-index:2000;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3)}
#toast.ok{color:var(--green)}#toast.er{color:#f08080}
@media(max-width:640px){
  .sb{position:fixed;right:0;top:0;bottom:0}
  .sb.closed{transform:translateX(100%);width:255px;min-width:255px}
  .sg{grid-template-columns:1fr}
  .ptg{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div id="bd" onclick="closeSB()"></div>
<div class="layout">
  <aside class="sb closed" id="sb">
    <div class="sb-head">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 40 40" fill="none"><path d="M20 2L23 14L35 14L25 21L28 33L20 26L12 33L15 21L5 14L17 14Z" fill="#c9a84c"/></svg>
        <span class="logo-txt">نور</span>
      </div>
      <button class="ibtn" onclick="closeSB()">✕</button>
    </div>
    <button class="newbtn" onclick="newChat()">+ محادثة جديدة</button>
    <div class="sb-cats">
      <div class="clabel">الاقسام</div>
      <button class="cat on" data-m="islamic" onclick="setMode('islamic',this)">🕌 العلوم الإسلامية</button>
      <button class="cat" data-m="quran" onclick="setMode('quran',this)">📖 القرآن الكريم</button>
      <button class="cat" data-m="hadith" onclick="setMode('hadith',this)">📜 الأحاديث النبوية</button>
      <button class="cat" data-m="fiqh" onclick="setMode('fiqh',this)">⚖️ الفقه والفتاوى</button>
      <button class="cat" data-m="prayer" onclick="setMode('prayer',this)">🧭 أحكام الصلاة</button>
      <button class="cat" data-m="study" onclick="setMode('study',this)">📚 المساعد الدراسي</button>
      <button class="cat" data-m="code" onclick="setMode('code',this)">💻 البرمجة</button>
      <button class="cat" data-m="general" onclick="setMode('general',this)">🌟 عام وثقافة</button>
    </div>
    <div class="sb-hist"><div class="clabel">السابقة</div><div id="hist"></div></div>
    <div class="sb-foot">
      <button class="fbtn" onclick="openAzkar()">📿 أذكار الصباح والمساء</button>
      <button class="fbtn" onclick="clearAll()">🗑️ مسح المحادثات</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="ibtn" onclick="toggleSB()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topmode" id="topmode">🕌 العلوم الإسلامية</div>
      <button class="ibtn" id="themeBtn" onclick="toggleTheme()" title="تبديل المظهر">🌙</button>
      <button class="ibtn" onclick="openAzkar()">📿</button>
      <button class="ibtn" onclick="delChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>

    <div class="welcome" id="welcome">
      <div class="wlogo"><div class="wring"></div>
        <svg width="52" height="52" viewBox="0 0 40 40" fill="none"><path d="M20 2L23 14L35 14L25 21L28 33L20 26L12 33L15 21L5 14L17 14Z" fill="#c9a84c" opacity=".95"/></svg>
      </div>
      <div class="wtitle">بسم الله الرحمن الرحيم</div>
      <div class="wsub">انا <strong>نور</strong>، مساعدك الإسلامي الذكي</div>
      <div class="pw">
        <div class="pwh"><span>🕐 مواقيت الصلاة</span><span class="pwcity" id="pcity">...</span></div>
        <div class="ptg">
          <div class="pti"><span class="ptn">الفجر</span><span class="ptt" id="pf">--:--</span></div>
          <div class="pti"><span class="ptn">الظهر</span><span class="ptt" id="pd">--:--</span></div>
          <div class="pti"><span class="ptn">العصر</span><span class="ptt" id="pa">--:--</span></div>
          <div class="pti"><span class="ptn">المغرب</span><span class="ptt" id="pm">--:--</span></div>
          <div class="pti"><span class="ptn">العشاء</span><span class="ptt" id="pi">--:--</span></div>
        </div>
        <div class="pwnext" id="pnext"></div>
      </div>
      <div class="sg" id="sug"></div>
    </div>

    <div class="chatarea" id="chat" style="display:none"><div class="msgs" id="msgs"></div></div>

    <div class="inarea">
      <div class="inwrap">
        <div class="inbadge" id="badge">🕌 العلوم الإسلامية</div>
        <div class="att-prev" id="attPrev" style="display:none">
          <img id="attImg" src="" alt="" style="display:none"/>
          <span id="attName"></span>
          <button class="att-x" onclick="clearAttach()">✕</button>
        </div>
        <div class="inrow">
          <button class="tbtn" id="voiceBtn" onclick="toggleVoice()" title="إدخال صوتي">🎤</button>
          <button class="tbtn" onclick="document.getElementById('imgInp').click()" title="إرسال صورة">🖼️</button>
          <button class="tbtn" onclick="document.getElementById('fileInp').click()" title="إرسال ملف">📎</button>
          <textarea id="inp" placeholder="اسالني عن القرآن والاحاديث والفقه..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,140)+'px'"></textarea>
          <button class="sbtn" id="sbtn" onclick="send()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <div class="disc">
        نور AI · Groq ·
        <span id="keyStatus"><span class="kdot"></span> المفتاح 1 نشط</span>
      </div>
    </div>
  </div>
</div>

<!-- Azkar Modal -->
<div class="ov" id="amod" style="display:none" onclick="if(event.target===this)closeAzkar()">
  <div class="mbox">
    <div class="mhead"><h2>📿 الأذكار</h2><button class="ibtn" onclick="closeAzkar()">✕</button></div>
    <div class="mbody">
      <div style="display:flex;gap:.45rem">
        <button class="azbtn on" id="btn-s" onclick="showAzkar('sabah')">🌅 الصباح</button>
        <button class="azbtn" id="btn-m" onclick="showAzkar('masa')">🌙 المساء</button>
      </div>
      <div id="azkar-list"></div>
    </div>
  </div>
</div>

<!-- Hidden inputs -->
<input type="file" id="imgInp" accept=".jpg,.jpeg,.png,.webp" style="display:none" onchange="handleImg(this)"/>
<input type="file" id="fileInp" accept=".txt,.pdf" style="display:none" onchange="handleFile(this)"/>
<div id="toast"></div>

<script>
// ============================================================
// المفاتيح — أضف مفاتيح إضافية في المصفوفة
// عند انتهاء مفتاح (429) ينتقل تلقائياً للتالي
// ============================================================
var KEYS = [
  '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',
  // 'gsk_SECOND_KEY_HERE',
  // 'gsk_THIRD_KEY_HERE',
];
// ============================================================

// ── VOICE ──
function toggleVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('المتصفح لا يدعم الميكروفون (استخدم Chrome)', 'er'); return; }
  if (recog) { recog.stop(); return; }
  recog = new SR();
  recog.lang = 'ar-SA';
  recog.continuous = false;
  recog.interimResults = false;
  recog.onresult = function(e) {
    var t = e.results[0][0].transcript;
    var inp = document.getElementById('inp');
    inp.value = t;
    inp.dispatchEvent(new Event('input'));
    toast('تم التعرف على صوتك', 'ok');
  };
  recog.onerror = function(e) { toast('خطأ في الميكروفون: ' + e.error, 'er'); };
  recog.onend = function() {
    recog = null;
    var btn = document.getElementById('voiceBtn');
    if (btn) { btn.classList.remove('rec'); btn.textContent = '🎤'; }
  };
  try {
    recog.start();
    var btn = document.getElementById('voiceBtn');
    btn.classList.add('rec'); btn.textContent = '⏹️';
  } catch(e) { toast('تعذر تشغيل الميكروفون', 'er'); recog = null; }
}

// ── IMAGE ATTACH ──
function resizeImg(dataUrl, maxW, maxH, cb) {
  var img = new Image();
  img.onload = function() {
    if (img.width <= maxW && img.height <= maxH) { cb(dataUrl); return; }
    var scale = Math.min(maxW/img.width, maxH/img.height);
    var cv = document.createElement('canvas');
    cv.width = Math.round(img.width*scale);
    cv.height = Math.round(img.height*scale);
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    cb(cv.toDataURL('image/jpeg', 0.85));
  };
  img.onerror = function() { cb(dataUrl); };
  img.src = dataUrl;
}

function handleImg(input) {
  var file = input.files[0]; if (!file) return;
  var rd = new FileReader();
  rd.onload = function(e) {
    resizeImg(e.target.result, 1024, 1024, function(resized) {
      var b64 = resized.split(',')[1];
      var mime = resized.indexOf('data:image/jpeg') === 0 ? 'image/jpeg' : file.type;
      S.attach = {type:'image', data:b64, name:file.name, mime:mime, preview:resized};
      document.getElementById('attImg').src = resized;
      document.getElementById('attImg').style.display = 'block';
      document.getElementById('attName').textContent = file.name;
      document.getElementById('attPrev').style.display = 'flex';
      toast('تم تحميل الصورة', 'ok');
    });
  };
  rd.readAsDataURL(file);
  input.value = '';
}

// ── FILE ATTACH ──
function handleFile(input) {
  var file = input.files[0]; if (!file) return;
  if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
    if (typeof pdfjsLib === 'undefined') { toast('مكتبة PDF لم تُحمل بعد', 'er'); return; }
    var rd = new FileReader();
    rd.onload = function(e) {
      var arr = new Uint8Array(e.target.result);
      pdfjsLib.getDocument({data:arr}).promise.then(function(pdf) {
        var pp = [];
        for (var i = 1; i <= pdf.numPages; i++) {
          pp.push(pdf.getPage(i).then(function(pg){ return pg.getTextContent(); }).then(function(tc){
            return tc.items.map(function(it){return it.str;}).join(' ');
          }));
        }
        return Promise.all(pp);
      }).then(function(texts) {
        S.attach = {type:'text', data:texts.join('\n\n'), name:file.name};
        setFilePreview('📄 ' + file.name);
        toast('تم استخراج نص PDF (' + pdf_pageCount(texts) + ' صفحة)', 'ok');
      }).catch(function(er){ toast('فشل قراءة PDF: ' + er.message, 'er'); });
    };
    rd.readAsArrayBuffer(file);
  } else {
    var rd2 = new FileReader();
    rd2.onload = function(e) {
      S.attach = {type:'text', data:e.target.result, name:file.name};
      setFilePreview('📝 ' + file.name);
      toast('تم تحميل الملف', 'ok');
    };
    rd2.onerror = function(){ toast('فشل قراءة الملف', 'er'); };
    rd2.readAsText(file, 'UTF-8');
  }
  input.value = '';
}
function pdf_pageCount(arr){ return arr.length; }
function setFilePreview(label) {
  document.getElementById('attImg').style.display = 'none';
  document.getElementById('attName').textContent = label;
  document.getElementById('attPrev').style.display = 'flex';
}
function clearAttach() {
  S.attach = null;
  document.getElementById('attPrev').style.display = 'none';
  document.getElementById('attImg').src = '';
  document.getElementById('attImg').style.display = 'none';
}

// ── API CALL WITH KEY ROTATION ──
function callAPI(msgs, hasImage, onSuccess, onError) {
  var attempt = 0;
  function tryKey() {
    if (attempt >= KEYS.length) {
      onError('انتهت جميع المفاتيح — أضف مفاتيح في كود KEYS[]');
      setKeyStatus('e', 'انتهت المفاتيح');
      return;
    }
    var idx = (attempt) % KEYS.length;
    var key = KEYS[idx];
    var model = hasImage ? 'meta-llama/llama-4-scout-17b-16e-instruct' : 'llama-3.3-70b-versatile';
    setKeyStatus('w', attempt === 0 ? ('المفتاح ' + (idx+1) + ' نشط') : ('تحويل للمفتاح ' + (idx+1)));

    fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key
      },
      body: JSON.stringify({
        model: model,
        messages: msgs,
        max_tokens: 800,
        temperature: 0.7
      })
    })
    .then(function(r) { return r.json().then(function(d){ return {s:r.status, d:d}; }); })
    .then(function(res) {
      if (res.s === 429 || res.s === 401) {
        attempt++;
        toast('مفتاح ' + idx + ' وصل للحد — محاولة التالي...', 'w');
        setTimeout(tryKey, 600);
      } else if (res.s !== 200) {
        var em = (res.d.error && res.d.error.message) || ('خطأ ' + res.s);
        onError(em);
      } else if (res.d.choices && res.d.choices[0] && res.d.choices[0].message) {
        setKeyStatus('', 'المفتاح ' + (idx+1) + ' نشط');
        onSuccess(res.d.choices[0].message.content || '');
      } else {
        onError('لم يصل رد من الخادم');
      }
    })
    .catch(function(e) { onError('خطأ في الاتصال: ' + e.message); });
  }
  tryKey();
}

function setKeyStatus(cls, txt) {
  var el = document.getElementById('keyStatus'); if (!el) return;
  el.innerHTML = '<span class="kdot' + (cls?' '+cls:'') + '"></span> ' + txt;
}

// ── SEND ──
function send() {
  if (S.busy) return;
  var inp = document.getElementById('inp');
  var txt = inp.value.trim();
  var hasAtt = !!S.attach;
  if (!txt && !hasAtt) return;
  if (!txt) txt = S.attach.type==='image' ? 'صف هذه الصورة بالتفصيل' : 'حلل محتوى هذا الملف';

  inp.value = ''; inp.style.height = 'auto';
  if (!S.cid) { mkConv(txt); showChat(); }
  var c = S.convs[S.cid];
  c.msgs.push({role:'user', content:txt});

  var imgPrev = hasAtt && S.attach.type==='image' ? S.attach.preview : null;
  addMsg('user', txt, true, imgPrev);
  scrollDown();

  // Build API messages
  var apiMsgs = [{role:'system', content: PROMPTS[S.mode]||PROMPTS.islamic}];
  for (var i = 0; i < c.msgs.length-1; i++) {
    apiMsgs.push({role: c.msgs[i].role==='assistant'?'assistant':'user', content: c.msgs[i].content});
  }
  var hasImage = false;
  var lastContent;
  if (hasAtt && S.attach.type==='image') {
    hasImage = true;
    lastContent = [
      {type:'text', text:txt},
      {type:'image_url', image_url:{url:'data:'+S.attach.mime+';base64,'+S.attach.data}}
    ];
  } else if (hasAtt && S.attach.type==='text') {
    var fileCtx = '\n\n--- محتوى الملف: ' + S.attach.name + ' ---\n' + S.attach.data.slice(0, 8000);
    lastContent = txt + fileCtx;
  } else {
    lastContent = txt;
  }
  apiMsgs.push({role:'user', content:lastContent});
  clearAttach();

  var tid = showTyping();
  S.busy = true;
  document.getElementById('sbtn').disabled = true;

  callAPI(apiMsgs, hasImage, function(reply) {
    removeTyping(tid);
    c.msgs.push({role:'assistant', content:reply});
    addMsg('assistant', reply, true, null);
    scrollDown(); saveC(); renderHist();
    S.busy = false;
    document.getElementById('sbtn').disabled = false;
    document.getElementById('inp').focus();
  }, function(err) {
    removeTyping(tid);
    addErrMsg(err);
    S.busy = false;
    document.getElementById('sbtn').disabled = false;
  });
}

function translate(btn) {
  var mcon = btn.closest('.mcon');

  if (existing) { existing.remove(); return; }
  var txt = mcon.querySelector('.mtxt').innerText;
  btn.disabled = true; btn.textContent = '⏳';
  var msgs = [
    {role:'system', content:'You are a translator. Translate Arabic text to English. Output ONLY the English translation.'},
    {role:'user', content: txt}
  ];
  callAPI(msgs, false, function(res) {
    btn.textContent = '🌐 EN'; btn.disabled = false;
    var div = document.createElement('div');

    mcon.appendChild(div);
  }, function() {
    btn.textContent = '🌐 EN'; btn.disabled = false;
    toast('فشلت الترجمة', 'er');
  });
}

// ── FORMAT ──
function fmt(text) {
  if(!text)return'';
  var lines=text.split('\n'),out=[],inCode=false,codeLi=[],listLi=[],listT='';
  function flushL(){if(!listLi.length)return;var t=listT==='ol'?'ol':'ul',it='';for(var k=0;k<listLi.length;k++)it+='<li>'+listLi[k]+'</li>';out.push('<'+t+'>'+it+'</'+t+'>');listLi=[];listT='';}
  for(var i=0;i<lines.length;i++){
    var raw=lines[i];
    if(raw.slice(0,3)==='```'){if(!inCode){flushL();inCode=true;codeLi=[];}else{inCode=false;out.push('<pre>'+esc(codeLi.join('\n'))+'</pre>');codeLi=[];}continue;}
    if(inCode){codeLi.push(raw);continue;}
    if(/^#{1,3} /.test(raw)){flushL();out.push('<h3>'+il(raw.replace(/^#{1,3} /,''))+'</h3>');continue;}
    if(/^[-*] /.test(raw)){if(listT!=='ul'){flushL();listT='ul';}listLi.push(il(raw.replace(/^[-*] /,'')));continue;}
    if(/^\d+\. /.test(raw)){if(listT!=='ol'){flushL();listT='ol';}listLi.push(il(raw.replace(/^\d+\. /,'')));continue;}
    if(raw.trim()===''){flushL();out.push('');continue;}
    flushL();out.push(il(raw));
  }
  flushL();if(inCode&&codeLi.length)out.push('<pre>'+esc(codeLi.join('\n'))+'</pre>');
  var parts=[],para=[];
  function fp(){if(para.length){parts.push('<p>'+para.join('<br>')+'</p>');para=[];}}
  for(var j=0;j<out.length;j++){var p=out[j];if(p===''){fp();continue;}if(p.charAt(0)==='<'&&p.slice(0,3)!=='<br'){fp();parts.push(p);}else para.push(p);}
  fp();return parts.join('\n');
}
function il(t){var s=esc(t);s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');s=s.replace(/`([^`]+)`/g,'<code>$1</code>');return s;}

function setMode(m,btn){

  document.querySelectorAll('.cat').forEach(function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  var name=MODES[m]||m;
  document.getElementById('topmode').textContent=name;
  document.getElementById('badge').textContent=name;
  renderSugs(m);
  if(window.innerWidth<=640)closeSB();
}
function renderSugs(m){
  var g=document.getElementById('sug');if(!g)return;
  var items=SUGS[m]||SUGS.general,html='';
  for(var i=0;i<items.length;i++){var q=items[i].q.replace(/'/g,"\\'");html+='<button class="sc" onclick="qs(\''+q+'\')"><span class="si">'+items[i].i+'</span><span class="st">'+items[i].t+'</span></button>';}
  g.innerHTML=html;
}
function showWelcome(){document.getElementById('welcome').style.display='flex';document.getElementById('chat').style.display='none';S.cid=null;}
function showChat(){document.getElementById('welcome').style.display='none';document.getElementById('chat').style.display='flex';}
function newChat(){showWelcome();clearAttach();if(window.innerWidth<=640)closeSB();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function mkConv(txt){var id=uid();S.convs[id]={id:id,title:txt.length>38?txt.slice(0,38)+'...':txt,mode:S.mode,msgs:[],at:Date.now()};S.cid=id;renderHist();return id;}
function renderHist(){
  var h=document.getElementById('hist');if(!h)return;
  var list=Object.values(S.convs).sort(function(a,b){return b.at-a.at;}).slice(0,25);
  if(!list.length){h.innerHTML='<div style="font-size:.73rem;color:var(--txt3);padding:.3rem">لا توجد محادثات</div>';return;}
  var html='';
  for(var i=0;i<list.length;i++){var cv=list[i];html+='<div class="hi'+(cv.id===S.cid?' on':'')+'" onclick="loadConv(\''+cv.id+'\')">💬 '+esc(cv.title)+'</div>';}
  h.innerHTML=html;
}
function loadConv(id){
  var c=S.convs[id];if(!c)return;
  S.cid=id;S.mode=c.mode;
  document.querySelectorAll('.cat').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-m')===c.mode);});
  document.getElementById('topmode').textContent=MODES[c.mode]||c.mode;
  document.getElementById('badge').textContent=MODES[c.mode]||c.mode;
  showChat();
  var msgs=document.getElementById('msgs');msgs.innerHTML='';
  for(var i=0;i<c.msgs.length;i++)addMsg(c.msgs[i].role,c.msgs[i].content,false,null);
  scrollDown();renderHist();if(window.innerWidth<=640)closeSB();
}
function qs(q){document.getElementById('inp').value=q;send();}
function delChat(){if(!S.cid)return;if(!confirm('حذف المحادثة؟'))return;delete S.convs[S.cid];saveC();renderHist();showWelcome();}
function clearAll(){if(!confirm('حذف جميع المحادثات؟'))return;S.convs={};S.cid=null;saveC();renderHist();showWelcome();toast('تم الحذف','ok');}

// ── SIDEBAR ──
function toggleSB(){var sb=document.getElementById('sb'),bd=document.getElementById('bd');if(sb.classList.contains('closed')){sb.classList.remove('closed');bd.style.display=window.innerWidth<=640?'block':'none';}else closeSB();}
function closeSB(){document.getElementById('sb').classList.add('closed');document.getElementById('bd').style.display='none';}

// ── AZKAR ──
function openAzkar(){document.getElementById('amod').style.display='flex';showAzkar('sabah');}
function closeAzkar(){document.getElementById('amod').style.display='none';}
function showAzkar(type){
  document.getElementById('btn-s').classList.toggle('on',type==='sabah');
  document.getElementById('btn-m').classList.toggle('on',type==='masa');
  var data=AZKAR[type],html='';
  for(var i=0;i<data.length;i++){var z=data[i];html+='<div class="azc"><div class="aza">'+z.a+'</div><div class="azk">🔄 '+z.c+'</div><div class="azf">✨ '+z.f+'</div></div>';}
  document.getElementById('azkar-list').innerHTML=html;
}

// ── PRAYER TIMES ──
function getPrayer(){
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){loadPT(p.coords.latitude,p.coords.longitude);},function(){loadPTCity('Mecca','Saudi Arabia');},{timeout:5000});
  else loadPTCity('Mecca','Saudi Arabia');
}
function loadPT(lat,lng){
  var d=new Date(),ds=d.getDate()+'-'+(d.getMonth()+1)+'-'+d.getFullYear();
  fetch('https://api.aladhan.com/v1/timings/'+ds+'?latitude='+lat+'&longitude='+lng+'&method=4').then(function(r){return r.json();}).then(function(data){if(data.status==='OK'){showPT(data.data.timings);document.getElementById('pcity').textContent='موقعك';}}).catch(function(){});
}
function loadPTCity(city,country){
  var d=new Date(),ds=d.getDate()+'-'+(d.getMonth()+1)+'-'+d.getFullYear();
  fetch('https://api.aladhan.com/v1/timingsByCity/'+ds+'?city='+encodeURIComponent(city)+'&country='+encodeURIComponent(country)+'&method=4').then(function(r){return r.json();}).then(function(data){if(data.status==='OK'){showPT(data.data.timings);document.getElementById('pcity').textContent=city;}}).catch(function(){});
}
function showPT(t){
  var map=[{id:'pf',k:'Fajr',n:'الفجر'},{id:'pd',k:'Dhuhr',n:'الظهر'},{id:'pa',k:'Asr',n:'العصر'},{id:'pm',k:'Maghrib',n:'المغرب'},{id:'pi',k:'Isha',n:'العشاء'}];
  var nm=new Date().getHours()*60+new Date().getMinutes(),minD=Infinity,times={};
  for(var i=0;i<map.length;i++){
    var el=document.getElementById(map[i].id);if(!el)continue;
    var ts=(t[map[i].k]||'').replace(/\s*\(.*\)/,'').trim();if(!ts)continue;
    el.classList.remove('nx');el.textContent=to12(ts);
    var pp=ts.split(':'),h=parseInt(pp[0]),m=parseInt(pp[1]),diff=(h*60+m)-nm;
    times[map[i].id]=diff;if(diff>0&&diff<minD)minD=diff;
  }
  var nextN='',nextT='';
  for(var j=0;j<map.length;j++){
    if(times[map[j].id]===minD){
      var e2=document.getElementById(map[j].id);if(e2){e2.classList.add('nx');nextN=map[j].n;nextT=e2.textContent;}
    }
  }
  var np=document.getElementById('pnext');
  if(np&&nextN){var hh=Math.floor(minD/60),mm=minD%60;np.textContent='القادمة: '+nextN+' '+nextT+' بعد '+(hh>0?hh+' ساعة و ':'')+mm+' دقيقة';}
}
function to12(t){if(!t)return'--:--';var p=t.split(':'),h=parseInt(p[0]),m=parseInt(p[1]);return(h%12||12)+':'+(m<10?'0':'')+m+' '+(h>=12?'م':'ص');}

// ── TOAST ──
var _tid;
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className=type||'';t.style.display='block';clearTimeout(_tid);_tid=setTimeout(function(){t.style.display='none';},3000);}
</script>
